# Dev dependencies for the cloud rewrite (plans 002+). Apps run on the host via
# `bun --watch` against these services; no app containers here.
#
# Usage: `bun run cloud:dev:infra` (loads infra/compose/.env.dev).
# Copy infra/compose/.env.dev.example -> infra/compose/.env.dev first.

name: deniz-cloud-dev

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-denizcloud}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-denizcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: ${MONGO_IMAGE:-mongo:8}
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    entrypoint: ["/bin/bash", "/usr/local/bin/deniz-mongo-entrypoint.sh"]
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-entrypoint.sh:/usr/local/bin/deniz-mongo-entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok === 1 ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo-init:
    image: ${MONGO_IMAGE:-mongo:8}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "/usr/local/bin/deniz-mongo-rs-init.sh"]
    environment:
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_PASS: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./scripts/mongo-rs-init.sh:/usr/local/bin/deniz-mongo-rs-init.sh:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      [
        "sh",
        "-c",
        "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru",
      ]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.38
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "curl --fail --silent http://localhost:7700/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  meili-data:
