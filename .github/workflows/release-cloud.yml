name: Release cloud API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/cloud-core/**"
      - "packages/schemas/**"
      - "infra/**"
      - ".github/workflows/release-cloud.yml"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing immutable API tag to deploy (blank deploys this commit)
        required: false
        type: string

concurrency:
  group: release-cloud-pi
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/denizlg24/deniz-cloud-api

jobs:
  build-api:
    name: Build and push ARM64 API image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.release.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || inputs.image_tag == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release metadata
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -n "$REQUESTED_TAG" ]]; then
            if [[ ! "$REQUESTED_TAG" =~ ^[0-9a-f]{40}$ ]]; then
              echo "image_tag must be a full Git SHA" >&2
              exit 1
            fi
            echo "image_tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: github.event_name != 'workflow_dispatch' || inputs.image_tag == ''
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: github.event_name != 'workflow_dispatch' || inputs.image_tag == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  deploy:
    name: Deploy to Pi
    needs: build-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pi
    env:
      IMAGE_TAG: ${{ needs.build-api.outputs.image_tag }}
      PI_HOST: ${{ vars.PI_TAILNET_HOST }}
    steps:
      - name: Check out deployment assets
        uses: actions/checkout@v7

      - name: Join the tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Validate deployment settings
        run: |
          test -n "$PI_HOST"
          test -n "$IMAGE_TAG"
          [[ "$PI_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]]

      - name: Copy infrastructure assets
        run: |
          tar -czf cloud-infra.tgz \
            infra/compose \
            infra/fail2ban \
            infra/network \
            infra/scripts \
            infra/systemd
          scp \
            -o StrictHostKeyChecking=accept-new \
            cloud-infra.tgz \
            "denizlg24@${PI_HOST}:/tmp/cloud-infra.tgz"
          ssh -o StrictHostKeyChecking=accept-new "denizlg24@${PI_HOST}" \
            "sudo install -d -o denizlg24 -g denizlg24 /opt/deniz-cloud && tar -xzf /tmp/cloud-infra.tgz -C /opt/deniz-cloud && rm -f /tmp/cloud-infra.tgz"

      - name: Pull and deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new "denizlg24@${PI_HOST}" \
            "cd /opt/deniz-cloud/infra/compose && test -f .env.pi && API_IMAGE='${API_IMAGE}:${IMAGE_TAG}' API_VERSION='${IMAGE_TAG}' docker compose --env-file .env.pi -f docker-compose.pi.yml pull && API_IMAGE='${API_IMAGE}:${IMAGE_TAG}' API_VERSION='${IMAGE_TAG}' docker compose --env-file .env.pi -f docker-compose.pi.yml up -d"

      - name: Health gate
        run: |
          for _ in {1..30}; do
            response="$(curl --fail --silent --show-error https://api.denizlg24.com/healthz || true)"
            if jq -e --arg version "$IMAGE_TAG" \
              '.status == "ok" and .version == $version' <<< "$response" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "API did not report version ${IMAGE_TAG}" >&2
          exit 1
