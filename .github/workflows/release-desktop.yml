name: Release desktop app

on:
  push:
    branches: ["main"]
    paths:
      - "apps/desktop/src-tauri/tauri.conf.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        shell: bash
        run: |
          current_version="$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)"

          # Manual runs always release the current version; no diff to compare.
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version="$(git show "${{ github.event.before }}:apps/desktop/src-tauri/tauri.conf.json" 2>/dev/null | jq -r '.version' 2>/dev/null || true)"

          if [[ "$current_version" == "$previous_version" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The Tauri configuration changed, but its version did not."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"

      - name: Create draft release and tag
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release $TAG already exists and is published." >&2
              exit 1
            fi

            echo "Reusing existing draft release $TAG."
            exit 0
          fi

          gh release create "$TAG" \
            --draft \
            --generate-notes \
            --target "${{ github.sha }}" \
            --title "Desktop v$VERSION"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - name: Windows x64
            platform: windows-latest
            args: ""
            rust_targets: ""
          - name: macOS Apple Silicon
            platform: macos-26
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-26-intel
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && '-' || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/desktop
          tauriScript: bunx tauri
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"

  publish:
    name: Publish release
    needs: [prepare, build]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --latest
